<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အသေးစိတ်ကြည့်ရန် | Product Detail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="brand-logo">✨ PLACE-HOLDER</a>
        </div>
    </header>

    <main class="container" id="product-detail-root">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>ရယူနေသည်...</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container"><p>© 2026 PLACE-HOLDER Myanmar</p></div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (!productId) {
                document.getElementById('product-detail-root').innerHTML = '<p>ပစ္စည်းမတွေ့ပါ။ (Product not found.)</p>';
                return;
            }
            try {
                await fetchProducts();
                const product = products.find(p => p.id === productId || p.product_code === productId);
                if (product) renderProductDetail(product);
                else document.getElementById('product-detail-root').innerHTML = '<p>ပစ္စည်းမရှိပါ။ (No such product.)</p>';
            } catch (e) {
                document.getElementById('product-detail-root').innerHTML = '<p>အင်တာနက်ချိတ်ဆက်မှုအားစစ်ဆေးပါ။</p>';
            }
        });
    </script>
</body>
</html>
